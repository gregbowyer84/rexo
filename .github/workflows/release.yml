name: release

on:
  push:
    branches:
      - release/**
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Compute version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build solution.slnx -c Release -p:Version=${{ steps.gitversion.outputs.semVer }} --no-restore

      - name: Test
        run: >
          dotnet test solution.slnx -c Release --no-build
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Publish test results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results (Release)
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Generate coverage summary
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"CoverageReport" \
            -reporttypes:"Cobertura;MarkdownSummaryGithub"
          cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-report
          path: |
            CoverageReport/**
            **/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Pack
        run: dotnet pack solution.slnx -c Release -o artifacts/packages -p:Version=${{ steps.gitversion.outputs.semVer }} --no-build

      - name: Create and push release tag
        env:
          TAG_NAME: v${{ steps.gitversion.outputs.semVer }}
        run: |
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists; continuing."
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "$TAG_NAME"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(steps.gitversion.outputs.semVer, '-') }}
          generate_release_notes: true
          files: artifacts/packages/*.nupkg

      - name: Publish to GitHub Packages
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate

      - name: Publish to NuGet.org
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "$NUGET_API_KEY" --skip-duplicate
