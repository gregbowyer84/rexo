name: release

on:
  push:
    branches:
      - main
      - alpha
      - alpha-*
      - beta
      - beta-*
      - edge
      - edge-*
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write
  packages: write
  id-token: write   # required for OIDC trusted publishing to NuGet.org

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Compute version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build solution.slnx -c Release -p:Version=${{ steps.gitversion.outputs.semVer }} --no-restore

      - name: Test
        run: >
          dotnet test solution.slnx -c Release --no-build
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Publish test results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results (Release)
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Generate coverage summary
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"CoverageReport" \
            -reporttypes:"Cobertura;MarkdownSummaryGithub"
          cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-report
          path: |
            CoverageReport/**
            **/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Pack
        run: dotnet pack src/Cli/Cli.csproj -c Release -o artifacts/packages -p:Version=${{ steps.gitversion.outputs.semVer }} --no-build

      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          git config --global user.signingkey "$KEY_ID"
          git config --global commit.gpgsign false
          git config --global tag.gpgsign true
          if [ -n "$GPG_PASSPHRASE" ]; then
            echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
            echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
            gpgconf --kill gpg-agent
          fi

      - name: Create and push release tag
        env:
          TAG_NAME: v${{ steps.gitversion.outputs.semVer }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists; continuing."
          else
            if [ -n "$GPG_PASSPHRASE" ]; then
              echo "$GPG_PASSPHRASE" | git tag -s "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME"
            else
              git tag -s "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME" 2>/dev/null \
                || git tag "$TAG_NAME" "$GITHUB_SHA"
            fi
            git push origin "$TAG_NAME"
          fi

      - name: Publish schema branch (schema/v<major.minor>, moving)
        run: |
          SCHEMA_VERSION=$(jq -r '.properties.schemaVersion.const' rexo.schema.json)
          SCHEMA_BRANCH="schema/v${SCHEMA_VERSION}"
          git push origin "$GITHUB_SHA:refs/heads/$SCHEMA_BRANCH" --force
          echo "Updated schema branch $SCHEMA_BRANCH to $GITHUB_SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.gitversion.outputs.preReleaseTag != '' }}
          generate_release_notes: true

      - name: Publish to GitHub Packages
        env:
          NUGET_ORG_USER: ${{ secrets.NUGET_ORG_USER }}
        if: ${{ env.NUGET_ORG_USER == '' }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate

      - name: NuGet login (OIDC -> temporary API key)
        env:
          NUGET_ORG_USER: ${{ secrets.NUGET_ORG_USER }}
        id: nuget-login
        if: ${{ env.NUGET_ORG_USER != '' }}
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_ORG_USER }}

      - name: Push to NuGet.org (trusted publishing)
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
