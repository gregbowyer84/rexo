name: dependabot-auto-merge

# Runs after CI completes on a Dependabot PR. Approves and enables auto-merge
# so the PR merges automatically once all required checks pass.
# Only acts on PRs opened by Dependabot — all other actors are ignored.
on:
  workflow_run:
    workflows: [ci-build-test]
    types: [completed]

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Only auto-merge patch and minor updates.
      # Major version bumps are left for manual review.
      - name: Enable auto-merge for patch and minor updates
        if: >
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          gh pr review "$PR_NUMBER" --approve --body "Automatically approved by dependabot-auto-merge (patch/minor update)."
          gh pr merge "$PR_NUMBER" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
