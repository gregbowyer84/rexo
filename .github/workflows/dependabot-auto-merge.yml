name: dependabot-auto-merge

# Approves and enables auto-merge for Dependabot patch/minor PRs.
# pull_request_target runs in the base-repo context so GITHUB_TOKEN has write
# permissions. Safe here because we never check out or execute PR code.
# Major version bumps are left for manual review.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Only auto-merge patch and minor updates.
      - name: Approve and enable auto-merge for patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review "$PR_URL" --approve \
            --body "Automatically approved: ${{ steps.metadata.outputs.update-type }} update."
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
