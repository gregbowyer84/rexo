name: dependabot-auto-merge

# Approves and enables auto-merge for Dependabot patch/minor PRs.
# pull_request_target runs in the base-repo context so GITHUB_TOKEN has write
# permissions. Safe here because we never check out or execute PR code.
# Major version bumps are left for manual review.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    env:
      DEPENDABOT_AUTO_APPROVE_TOKEN: ${{ secrets.DEPENDABOT_AUTO_APPROVE_TOKEN }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Actions tokens are not allowed to submit approvals.
      # Optionally provide DEPENDABOT_AUTO_APPROVE_TOKEN (PAT from a maintainer/bot user)
      # if your branch protection requires an approval before merge.
      - name: Optionally approve with bot token for patch and minor updates
        if: >-
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor') &&
          env.DEPENDABOT_AUTO_APPROVE_TOKEN != ''
        run: |
          gh pr review "$PR_URL" --approve \
            --body "Automatically approved: ${{ steps.metadata.outputs.update-type }} update."
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTO_APPROVE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      # Enable auto-merge for patch/minor updates. This queues the merge and GitHub
      # will complete it after all required branch protection checks are satisfied.
      - name: Enable auto-merge for patch and minor updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
