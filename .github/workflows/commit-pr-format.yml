name: commit-and-pr-format

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-format:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title and body format
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr.title ?? "").trim();
            const body = pr.body ?? "";

            const titlePattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9][a-z0-9\-/]*\))?!?: .+$/;

            if (!titlePattern.test(title)) {
              core.setFailed(
                "PR title must follow Conventional Commits format: type(scope): summary. " +
                "Example: feat(cli): add parallel step execution"
              );
              return;
            }

            if (title.length > 100) {
              core.setFailed("PR title must be 100 characters or fewer.");
              return;
            }

            const requiredSections = ["## Summary", "## Checklist", "## Validation"];
            const missingSections = requiredSections.filter(section => !body.includes(section));

            if (missingSections.length > 0) {
              core.setFailed(`PR body is missing required sections: ${missingSections.join(", ")}`);
              return;
            }

            if (!/- \[[xX]\]/.test(body)) {
              core.setFailed("PR checklist must have at least one completed item (`- [x]`).");
              return;
            }

            const hasBuildCommand = /dotnet build solution\.slnx -c Release/.test(body);
            const hasTestCommand = /dotnet test solution\.slnx -c Release( --no-build)?/.test(body);

            if (!hasBuildCommand || !hasTestCommand) {
              core.setFailed(
                "Validation section must include `dotnet build solution.slnx -c Release` and " +
                "`dotnet test solution.slnx -c Release` (optionally with --no-build)."
              );
            }

  lint-commit-messages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
