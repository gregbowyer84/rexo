workflow: GitHubFlow/v1
mode: ContinuousDelivery
tag-prefix: '[vV]?'
assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
assembly-informational-format: '{InformationalVersion}'
commit-message-incrementing: Enabled
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'
branches:
  main:
    regex: ^main$
    increment: Patch
    is-main-branch: true
  main-lane:
    regex: ^main-(?<BranchName>[A-Za-z0-9._-]+)$
    label: '{BranchName}'
    increment: Patch
  edge:
    regex: ^edge$
    label: edge
    increment: Patch
  edge-lane:
    regex: ^edge-(?<BranchName>[A-Za-z0-9._-]+)$
    label: edge-{BranchName}
    increment: Patch
  alpha:
    regex: ^alpha$
    label: alpha
    increment: Patch
  alpha-lane:
    regex: ^alpha-(?<BranchName>[A-Za-z0-9._-]+)$
    label: alpha-{BranchName}
    increment: Patch
  support:
    regex: ^support[/-].+$
    increment: Patch
    is-release-branch: true
  support-lane:
    regex: ^support[/-].+-(?<BranchName>[A-Za-z0-9._-]+)$
    label: '{BranchName}'
    increment: Patch
    is-release-branch: true
  customer-support:
    regex: ^customer-support[/-].+$
    increment: Patch
    is-release-branch: true
  customer-support-lane:
    regex: ^customer-support[/-].+-(?<BranchName>[A-Za-z0-9._-]+)$
    label: '{BranchName}'
    increment: Patch
    is-release-branch: true
  feature:
    regex: ^features?[/-](?<BranchName>.+)$
    label: '{BranchName}'
    increment: Inherit
  hotfix:
    regex: ^hotfix(es)?[/-].+$
    label: beta
    increment: Patch
  pull-request:
    regex: ^(pull|pull-request|pr)[/-].+$
    label: PullRequest{Number}
    increment: Inherit
  unknown:
    regex: ^(?:.+[/-])?(?<BranchName>[A-Za-z0-9._-]+)$
    label: '{BranchName}'
    increment: Inherit
